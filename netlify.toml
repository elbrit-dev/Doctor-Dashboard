# Netlify configuration for the Doctor Validation Dashboard.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Make the frontend's existing fetch('/api/doctors') hit the serverless function.
# Must come BEFORE the SPA catch-all below.
[[redirects]]
  from = "/api/doctors"
  to = "/.netlify/functions/doctors"
  status = 200

# CRM review write-back (POST) → posts a comment on the Lead in ERPNext.
[[redirects]]
  from = "/api/review"
  to = "/.netlify/functions/review"
  status = 200

# SPA fallback — every other route serves the built index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
