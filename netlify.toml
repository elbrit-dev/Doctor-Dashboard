# Netlify configuration for the Doctor Validation Dashboard.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Make the frontend's existing fetch('/api/doctors') hit the serverless function.
# Must come BEFORE the SPA catch-all below.
[[redirects]]
  from = "/api/doctors"
  to = "/.netlify/functions/doctors"
  status = 200

# CRM review write-back (POST) → posts a comment on the Lead in ERPNext.
[[redirects]]
  from = "/api/review"
  to = "/.netlify/functions/review"
  status = 200

# Bulk reconciliation: fetch many Leads (+addresses) by doctor code.
[[redirects]]
  from = "/api/leads-by-code"
  to = "/.netlify/functions/leads-by-code"
  status = 200

# Create/update/duplicate triage for an uploaded sheet.
[[redirects]]
  from = "/api/reconcile"
  to = "/.netlify/functions/reconcile"
  status = 200

# Batched create/update of Leads (+addresses) from an uploaded sheet.
[[redirects]]
  from = "/api/process"
  to = "/.netlify/functions/process"
  status = 200

# Batched update of EXISTING Leads (scalar backfill + role profile + address).
[[redirects]]
  from = "/api/update"
  to = "/.netlify/functions/update"
  status = 200

# Merge padded duplicate Leads into their clean form and delete the padded ones.
[[redirects]]
  from = "/api/merge-duplicates"
  to = "/.netlify/functions/merge-duplicates"
  status = 200

# SPA fallback — every other route serves the built index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
